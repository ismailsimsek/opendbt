name: Create Release Tag

on:
  push:
    branches: [ main ]

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Version tag
        # uses: samamorgan/action-autotag-python@master
        uses: Jorricks/action-python-autotagging@1.0.1
        with:
          path: setup.py
          variable: version
          github_token: ${{ secrets.GITHUB_TOKEN }}